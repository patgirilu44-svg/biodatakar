name: Build Flutter APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      - name: Copy AAPT2 to Flutter SDK
        run: |
          mkdir -p /root/android-sdk/build-tools/35.0.0/
          cp /usr/local/lib/android/sdk/build-tools/35.0.0/aapt2 \
             /root/android-sdk/build-tools/35.0.0/aapt2
          chmod +x /root/android-sdk/build-tools/35.0.0/aapt2
          echo "✅ aapt2 copied successfully"

      - run: flutter pub get

      - run: flutter build apk --debug --no-tree-shake-icons

      - uses: actions/upload-artifact@v4
        with:
          name: biodatakar-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
